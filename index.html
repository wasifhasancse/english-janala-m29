<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- google fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">

  <title>English Janala</title>
  <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">
  <!-- css link  -->
  <link rel="stylesheet" href="./style/style.css">
  <!-- daisyUi and Tailwindcss -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- fontawsome CDN  -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
  <!-- header section start -->
  <header>
    <nav>
      <div class="navbar bg-base-100 shadow-sm">
        <div class="navbar-start">
          <div class="dropdown">
            <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" />
              </svg>
            </div>
            <ul tabindex="-1" class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
              <li><button><img src="./assets/fa-circle-question.png" alt="fa-circle-question">FAQ</button></li>
              <li><button><img src="./assets/fa-book-open.png" alt="fa-book-open">Learn</button></li>
              <li><button><img src="./assets/fa-arrow-right-from-bracket.png" alt="logOut">logOut</button></li>
            </ul>
          </div>
          <a class="btn btn-ghost text-xl font-semibold">English <img src="./assets/logo.png" alt="logo"> <span
              class="font-bangla">জানালা</span></a>
        </div>
        <div class="navbar-end hidden lg:flex">
          <ul class="menu menu-horizontal px-1 gap-2.5">
            <li><button class="btn btn-outline btn-primary group"><img class="group-hover:invert"
                  src="./assets/fa-circle-question.png" alt="fa-circle-question">FAQ</button></li>
            <li><button class="btn btn-outline btn-primary group"><img class="group-hover:invert"
                  src="./assets/fa-book-open.png" alt="fa-book-open">Learn</button></li>
            <li><button class="btn btn-outline btn-primary group"><img class="group-hover:invert"
                  src="./assets/fa-arrow-right-from-bracket.png" alt="logOut">logOut</button></li>
          </ul>
        </div>

      </div>
    </nav>
  </header>
  <!-- header section end -->

  <!-- hero section start -->
  <section>
    <div class="bg-base-200 min-h-screen flex items-center justify-center">
      <div class="flex flex-col md:flex-row-reverse justify-between items-center w-11/12 mx-auto">
        <div>
          <img src="./assets/hero-student.png" alt="hero-image" />
        </div>
        <div class="text-center md:text-left">
          <h1 class="text-5xl font-bold"><span class="text-sky-400">English</span> is Easy!!</h1>
          <p class="py-6 font-bangla font-semibold text-gray-600 md:max-w-[80%]">
            আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা আপনার দক্ষতা বাড়াতে চান, আমাদের
            Interactive Lessons
            আপনাকে নিয়ে যাবে অন্য একটি Level এ
          </p>

          <fieldset class="space-y-2.5 mb-2.5 flex flex-col">
            <div>
              <input type="email" class="py-2.5 px-5 hover:border-indigo-500 focus:outline-indigo-500"
                placeholder="Enter Your Email" />
            </div>
            <div>
              <input type="password" class="py-2.5 px-5 hover:border-indigo-500 focus:outline-indigo-500"
                placeholder="Enter Your Password" />
            </div>
          </fieldset>

          <button class="btn btn-primary">Get Started</button>
        </div>
      </div>
    </div>
  </section>
  <!-- hero section end -->

  <!-- Let's Learn Vocabularies section start  -->
  <section class="bg-base-200">
    <div class="py-10 w-11/12 mx-auto flex flex-col items-center justify-center gap-5">
      <div class="text-center ">
        <h1 class="text-4xl font-bold"><span class="text-sky-400">Let's</span> Learn Vocabularies</h1>
      </div>
      <div id="lessons-button" class="flex flex-wrap gap-2.5 items-center justify-center">
        <!-- lessons button will be here dynamically by API -->
      </div>
    </div>
  </section>

  <!-- Let's Learn Vocabularies section Data start -->
  <section class="bg-base-200 py-10">
    <div id="lesson-word-show"
      class="bg-base-300 p-10 w-11/12 mx-auto rounded-xl grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">

      <!-- by default message -->
      <div
        class="col-span-full bg-base-300 py-20 w-11/12 mx-auto rounded-xl flex flex-col items-center justify-center text-center gap-5">
        <p class="font-bangla text-md md:text-lg text-gray-600">
          আপনি এখনো কোন <span>Lesson Select</span> করেন নি
        </p>
        <p class="font-bangla text-xl md:text-4xl font-semibold">
          একটি Lesson Select করুন।
        </p>
      </div>

    </div>
  </section>
  <!-- Let's Learn Vocabularies section Data end -->
  <!-- Let's Learn Vocabularies section end -->

  <!-- modal section  -->
  <dialog id="wordDetailsModal" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box">
      <div id="modal-details" class="border border-sky-100 rounded-lg p-5">
         <!-- here modal data show dymanically by API -->
      </div>
      <div class="modal-action">
        <form method="dialog">
          <!-- if there is a button in form, it will close the modal -->
          <button class="btn btn-primary">Complete Learning</button>
        </form>
      </div>
    </div>
  </dialog>

  <script src="./js/index.js"></script>
</body>

</html>
